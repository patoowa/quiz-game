<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Game</title>
</head>
<body>
    <div class="container">
        <div class="screen-active" id="start-screen">
            <h1>Quiz Game</h1>
            <p>Test your knowledge with this fun quiz!</p>
            <button id="start-btn">Start Quiz</button>
        </div>
        <div class="screen" id="quiz-screen">
            <h2>Question here</h2>
            <div class="quiz-info">
                <p>Question <span id="current-question">1</span> of <span>5</span></p>
                <p>Score: <span id="score">0</span></p>
                <div id="answers-containter" class="answers-container">
                    <!--Answer buttons generated in js code-->
                </div>
                <div class="progress-bar">
                    <div id="progress" class="progress"></div>
                </div>
            </div>
            <div id="result-screen" class="screen">
                <h1>Quiz results</h1>
                <div class="result-info">
                    <p>You scored <span id="final-score">0</span>of <span id="max-score">5</span></p>
                    <div id="result-message">Keep studying! You'll get better!</p>
                </div>
                <button>Restart quiz</button>
            </div>
            
        </div>
    

</body>
</html>
